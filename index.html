<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Minecraft Bee Texture tile with a dark overlay to make text easy to read */
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.9)), 
                        url('https://i.pinimg.com/236x/6e/68/21/6e6821db97f6c3fec38bc206776768db.jpg');
            background-size: 120px; /* Perfectly sizes the block texture as a repeatable grid */
            background-repeat: repeat;
            color: #ffffff; 
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            animation: appReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes appReveal {
            0% { opacity: 0; filter: blur(10px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover { background: #fbbb2c; }
        
        /* REMIXED SIDEBAR */
        .sidebar {
            width: 290px;
            background-color: rgba(10, 8, 4, 0.92);
            backdrop-filter: blur(25px);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(251, 187, 44, 0.12); 
            flex-shrink: 0;
            z-index: 10;
            animation: slideSidebar 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideSidebar {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* STATIC LOGO CONTAINER (No Hover Effects) */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 4px;
            cursor: pointer;
        }
        .logo-img {
            width: 34px;
            height: 34px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(251, 187, 44, 0.3);
            background-color: transparent; 
            padding: 0;
            display: block;
        }
        
        /* STYLING FOR YOUR CUSTOM PNG BRANDING IN SIDEBAR */
        .logo-text-image {
            height: 22px; 
            object-fit: contain;
            display: block;
        }

        /* REMIXED NEW CHAT BUTTON */
        .new-chat-btn {
            background: rgba(251, 187, 44, 0.05);
            color: #fbbb2c;
            border: 1px solid rgba(251, 187, 44, 0.25);
            border-radius: 20px;
            padding: 12px 18px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .new-chat-btn svg { transition: transform 0.4s ease; color: #fbbb2c; }
        .new-chat-btn:hover {
            background-color: #fbbb2c;
            color: #000000;
            border-color: #fbbb2c;
            box-shadow: 0 6px 15px rgba(251, 187, 44, 0.15);
            transform: translateY(-1px);
        }
        .new-chat-btn:hover svg { transform: rotate(90deg); color: #000000; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            background-color: rgba(251, 187, 44, 0.2);
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* REMIXED CHAT HISTORY */
        .chat-history {
            flex: 1;
            margin-top: 24px;
            font-size: 13.5px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 2px;
        }
        
        .history-item {
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            cursor: pointer;
            color: #999999; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transform-origin: left center;
            animation: listPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transition: all 0.3s ease;
        }

        @keyframes listPopIn {
            from { opacity: 0; transform: scale(0.95) translateX(-10px); filter: blur(2px); }
            to { opacity: 1; transform: scale(1) translateX(0); filter: blur(0); }
        }

        .history-item:hover {
            background: rgba(251, 187, 44, 0.04);
            color: #ffffff;
            border-left: 3px solid rgba(251, 187, 44, 0.4);
        }
        .history-item.active {
            background: rgba(251, 187, 44, 0.08);
            color: #fbbb2c;
            font-weight: 600;
            border-left: 3px solid #fbbb2c;
            border-top: 1px solid rgba(251, 187, 44, 0.1);
            border-right: 1px solid rgba(251, 187, 44, 0.1);
            border-bottom: 1px solid rgba(251, 187, 44, 0.1);
        }
        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 12px;
        }
        .delete-chat-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            opacity: 0;
            transform: scale(0.7);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .history-item:hover .delete-chat-btn,
        .history-item.active .delete-chat-btn {
            opacity: 0.5;
            transform: scale(1);
        }
        .delete-chat-btn:hover {
            opacity: 1 !important;
            color: #ff4444 !important;
            transform: scale(1.1) !important;
        }

        .history-item.deleting {
            animation: listCollapse 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes listCollapse {
            to { opacity: 0; transform: translateX(30px) scale(0.9); height: 0; padding: 0; margin: 0; }
        }

        .sidebar-footer {
            padding: 16px 4px 4px 4px;
            border-top: 1px solid rgba(251, 187, 44, 0.08);
            font-size: 10px;
            color: #444444;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent; 
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(251, 187, 44, 0.1); 
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            height: 70px;
            animation: slideHeader 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            z-index: 5;
        }

        @keyframes slideHeader {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* CONTAINER FOR TOP HEADER LOGO */
        .brand-title-container {
            display: flex;
            align-items: center;
            height: 100%;
        }
        
        /* STYLING FOR YOUR CUSTOM PNG BRANDING IN TOP HEADER */
        .header-logo-image {
            height: 24px; 
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(251, 187, 44, 0.45)); /* Replaces the old text glow shadow */
        }

        .model-select {
            background-color: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            border: 1px solid rgba(251, 187, 44, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
        }
        .model-select:hover {
            background-color: #fbbb2c;
            color: #000000;
            box-shadow: 0 4px 15px rgba(251, 187, 44, 0.4);
            transform: translateY(-2px);
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }
        .message-row {
            display: flex;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            opacity: 0;
            transform-origin: bottom center;
            animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes liquidBounce {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        
        .message-row.user-row { justify-content: flex-end; }
        .message-row.user-row .text-block {
            background-color: #fbbb2c;
            color: #000000;
            padding: 16px 24px;
            border-radius: 24px 24px 4px 24px;
            max-width: 75%;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(251, 187, 44, 0.15);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            word-wrap: break-word;
        }
        .message-row.user-row:hover .text-block {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(251, 187, 44, 0.25);
        }

        .message-row.ai-row {
            justify-content: flex-start;
            gap: 20px;
        }
        .ai-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background-color: transparent;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            flex-shrink: 0;
            border: 2px solid #fbbb2c;
            box-shadow: 0 0 15px rgba(251, 187, 44, 0.2);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }
        .ai-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message-row.ai-row:hover .ai-avatar {
            box-shadow: 0 0 25px rgba(251, 187, 44, 0.8);
            transform: scale(1.1);
        }
        .message-row.ai-row .text-block {
            color: #f0f0f0;
            padding: 8px 0;
            max-width: calc(100% - 60px);
            font-size: 16px;
            line-height: 1.7;
            width: 100%;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        a.chat-link {
            color: #fbbb2c;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease, text-decoration 0.2s ease;
        }
        a.chat-link:hover {
            color: #ffd666;
            text-decoration: underline;
        }
   
        .code-container {
            margin: 16px 0;
            background: #0f0f0f;
            border: 1px solid rgba(251, 187, 44, 0.2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: liquidBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .code-header {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid rgba(251, 187, 44, 0.3);
            color: #aaaaaa;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .copy-btn:hover {
            background-color: #fbbb2c !important;
            color: #000000 !important;
            border-color: #fbbb2c !important;
            box-shadow: 0 0 10px rgba(251, 187, 44, 0.3);
            transform: translateY(-1px);
        }
        .copy-btn:active { transform: translateY(1px); }
        
        .code-block {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            font-size: 14.5px;
            line-height: 1.6;
            color: #e0e0e0;
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        .code-block::-webkit-scrollbar { height: 6px; }
        .code-block::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }
        .code-block::-webkit-scrollbar-thumb:hover { background: #fbbb2c; }

        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            height: 24px;
            padding: 8px 0;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background-color: #fbbb2c;
            border-radius: 50%;
            animation: sineWave 1.2s infinite ease-in-out;
        }
        .typing-indicator .dot:nth-child(1) { animation-delay: 0s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes sineWave {
            0%, 100% { transform: translateY(0) scale(0.8); opacity: 0.3; box-shadow: 0 0 0 transparent; }
            50% { transform: translateY(-8px) scale(1.2); opacity: 1; box-shadow: 0 5px 15px rgba(251,187,44,0.6); }
        }

        .input-panel {
            padding: 0 24px 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 30%, transparent);
            animation: slideInput 1s cubic-bezier(0.16, 1, 0.3, 1) both;
            z-index: 5;
        }

        @keyframes slideInput {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-wrapper {
            max-width: 850px;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.92);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(251, 187, 44, 0.2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.85);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .input-wrapper:focus-within {
            box-shadow: 0 15px 50px rgba(251, 187, 44, 0.15);
            border-color: rgba(251, 187, 44, 0.5);
            transform: translateY(-2px);
        }

        .input-controls-row {
            display: flex;
            align-items: flex-end;
            width: 100%;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.05);
            color: #aaaaaa;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 8px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .action-btn:hover {
            background-color: #fbbb2c;
            color: #000000;
            transform: scale(1.1);
        }
        
        .mic-btn.recording {
            background-color: #ff3333 !important;
            color: #ffffff !important;
            animation: pulse-recording 1.2s infinite ease-in-out;
        }
        @keyframes pulse-recording {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.6); }
            50% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 250px;
            height: 28px;
            line-height: 28px;
            padding: 0 8px;
            transition: height 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        textarea::placeholder {
            color: #666666;
            transition: color 0.3s ease;
        }
        textarea:focus::placeholder { color: #aaaaaa; }
        
        .send-btn {
            background-color: rgba(255,255,255,0.05);
            color: #666666;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .send-btn svg { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .send-btn.active {
            background-color: #fbbb2c;
            color: #000000;
            box-shadow: 0 0 15px rgba(251, 187, 44, 0.4);
        }
        .send-btn.active:hover {
            box-shadow: 0 0 25px rgba(251, 187, 44, 0.8);
            transform: translateY(-3px) scale(1.05);
        }
        .send-btn.active:hover svg { transform: translate(2px, -2px) scale(1.1); }
        
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container" onclick="playClickSound(); location.reload()">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgGbIL8ZPdSPu6hTlRtfzbXE4hhPn977svX9BmFQN3Mg&s=10" alt="bee logo" class="logo-text-img">
                
                <img src="https://github.com/jorgeasantiago904-design/bee-ai-logo/blob/main/Untitled%20design%20(6).png?raw=true" alt="Bee logo" class="logo-text-image">
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Hive Session
            </button>
        </div>
        
        <div class="chat-history" id="chatHistoryContainer"></div>
        
        <div class="sidebar-footer">Honeycombs Connected</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="brand-title-container">
                <img src="https://github.com/jorgeasantiago904-design/bee-ai-logo/blob/main/Untitled%20design%20(6).png?raw=true" alt="Bee AI" class="header-logo-image">
            </div>
            
            <div class="model-selector-wrapper">
                <select class="model-select" id="modelSelect" onchange="playClickSound()">
                     <option value="groq/compound">Bee AI pro</option>
                     <option value="groq/compound">Bee AI flash</option>
                </select>
            </div>
        </div>
        
        <div class="chat-container" id="chatBox"></div>

        <div class="input-panel">
            <div class="input-wrapper">
                <div class="input-controls-row">
                    <button class="action-btn mic-btn" id="micBtn" onclick="playClickSound(); toggleMicrophone()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <textarea id="userInput" placeholder="Message Bee AI..." rows="1" oninput="autoGrow(this)" onkeypress="handleKeyPress(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage(event)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
            <div class="disclaimer">Outputs are buzzing naturally with minimal delays.</div>
        </div>
    </div>

<script>
    const CHATBOT_NAME = "Bai AI";
    const SYSTEM_PROMPT = "Your name is Bee AI. You are a Minecraft baby bee themed AI assistant. Talk completely naturally, logically, and professionally. Keep responses concise, direct, fast, and optimized to save performance. Personality: precise, quiet, and cold-headed.";
    const apiKey = "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"; 

    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const chatBox = document.getElementById('chatBox');
    const chatHistoryContainer = document.getElementById('chatHistoryContainer');
    const newChatBtn = document.getElementById('newChatBtn');
    const micBtn = document.getElementById('micBtn');

    let chatLibrary = {}; 
    let currentChatId = "";
    let recognition = null;
    let isRecording = false;

    const audioPool = [];
    const poolSize = 20;
    const soundUrl = "https://www.myinstants.com/en/instant/minecraft-click/?utm_source=copy&utm_medium=share";

    for (let i = 0; i < poolSize; i++) {
        const audio = new Audio(soundUrl);
        audio.volume = 0.45;
        audioPool.push(audio);
    }
    let poolIndex = 0;

    function playClickSound() {
        try {
            const audioInstance = audioPool[poolIndex];
            audioInstance.currentTime = 0;
            audioInstance.play().catch(e => {});
            poolIndex = (poolIndex + 1) % poolSize;
        } catch (e) {}
    }

    function checkAndRequestPermission(permissionType) {
        const savedPerms = JSON.parse(localStorage.getItem('sol_permissions') || '{}');
        if (savedPerms[permissionType] === 'granted') {
            return Promise.resolve(true);
        }
        const accept = confirm(`Bee AI requests system authorization to access your "${permissionType}". Permit access?`);
        if (accept) {
            savedPerms[permissionType] = 'granted';
            localStorage.setItem('sol_permissions', JSON.stringify(savedPerms));
            return Promise.resolve(true);
        } else {
            savedPerms[permissionType] = 'denied';
            localStorage.setItem('sol_permissions', JSON.stringify(savedPerms));
            return Promise.resolve(false);
        }
    }

    function createRipple(event, element) {
        const circle = document.createElement("span");
        const diameter = Math.max(element.clientWidth, element.clientHeight);
        const radius = diameter / 2;
        const rect = element.getBoundingClientRect();
        
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - rect.left - radius}px`;
        circle.style.top = `${event.clientY - rect.top - radius}px`;
        circle.classList.add("ripple");
        
        const ripple = element.querySelector(".ripple");
        if (ripple) { ripple.remove(); }
        element.appendChild(circle);
    }

    newChatBtn.addEventListener("mousedown", function(e) { 
        playClickSound(); 
        createRipple(e, this); 
    });

    window.onload = () => {
        const savedLibrary = localStorage.getItem('bee_ai_library');
        const savedCurrentId = localStorage.getItem('bee_ai_current_id');
        
        if (savedLibrary) {
            chatLibrary = JSON.parse(savedLibrary);
            currentChatId = savedCurrentId;
            if (!chatLibrary[currentChatId]) createNewChat();
        } else {
            createNewChat();
        }
        renderSidebar();
        loadChatMessages();
        setupSpeechRecognition();
    };

    function saveToStorage() {
        localStorage.setItem('bee_ai_library', JSON.stringify(chatLibrary));
        localStorage.setItem('bee_ai_current_id', currentChatId);
    }

    function createNewChat() {
        const id = 'chat_' + Date.now();
        chatLibrary[id] = {
            title: "New Session",
            history: [{ "role": "system", "content": SYSTEM_PROMPT }]
        };
        currentChatId = id;
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function switchChat(id) {
        if (currentChatId === id) return;
        playClickSound();
        currentChatId = id;
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function deleteChat(id, event) {
        event.stopPropagation();
        playClickSound();
        const row = document.querySelector(`[data-id="${id}"]`);
        if (row) {
            row.classList.add('deleting');
            row.addEventListener('animationend', () => executeDeletion(id));
        } else {
            executeDeletion(id);
        }
    }

    function executeDeletion(id) {
        delete chatLibrary[id];
        const remainingIds = Object.keys(chatLibrary);
        if (remainingIds.length === 0) {
            createNewChat();
        } else if (currentChatId === id) {
            currentChatId = remainingIds[remainingIds.length - 1];
        }
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function renderSidebar() {
        chatHistoryContainer.innerHTML = '';
        const ids = Object.keys(chatLibrary);
        ids.forEach((id, index) => {
            const chatItem = chatLibrary[id];
            const row = document.createElement('div');
            row.className = `history-item ${id === currentChatId ? 'active' : ''}`;
            row.setAttribute('data-id', id);
            row.style.animationDelay = `${index * 0.05}s`; 
            row.onclick = () => switchChat(id);

            const titleSpan = document.createElement('span');
            titleSpan.className = 'history-title';
            titleSpan.innerText = chatItem.title;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-chat-btn';
            deleteBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
            deleteBtn.onclick = (e) => deleteChat(id, e);

            row.appendChild(titleSpan);
            row.appendChild(deleteBtn);
            chatHistoryContainer.insertBefore(row, chatHistoryContainer.firstChild);
        });
    }

    function loadChatMessages() {
        chatBox.innerHTML = '';
        const activeHistory = chatLibrary[currentChatId].history;
        
        appendSystemMessage("Hive network initialized. Flight channels green.");

        activeHistory.forEach((msg, idx) => {
            if (msg.role === 'user') {
                appendUserMessage(msg.content, idx);
            }
            if (msg.role === 'assistant') {
                const block = appendAiMessagePlaceholder(idx);
                updateAiMessage(block, msg.content);
            }
        });
    }

    newChatBtn.addEventListener('click', () => createNewChat());
    userInput.addEventListener('input', () => { toggleSendBtnState(); });

    function toggleSendBtnState() {
        if (userInput.value.trim() !== '') {
            sendBtn.classList.add('active');
        } else {
            sendBtn.classList.remove('active');
        }
    }

    function autoGrow(element) {
        element.style.height = "28px";
        if(element.scrollHeight > 28) {
            element.style.height = (element.scrollHeight) + "px";
        }
    }

    function setupSpeechRecognition() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) {
            micBtn.style.display = 'none';
            return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            if (finalTranscript) {
                userInput.value += (userInput.value ? ' ' : '') + finalTranscript;
                autoGrow(userInput);
                toggleSendBtnState();
            }
        };

        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };

        recognition.onerror = (e) => {
            console.error(e);
            isRecording = false;
            micBtn.classList.remove('recording');
        };
    }

    function toggleMicrophone() {
        if (!recognition) return;

        checkAndRequestPermission("microphone").then(granted => {
            if (!granted) return;

            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                } catch (e) {
                    console.error(e);
                }
            }
        });
    }

    async function sendMessage(event) {
        playClickSound();

        if (event && event.type === 'click' && sendBtn.classList.contains('active')) {
             createRipple(event, sendBtn);
        }

        let userText = userInput.value.trim();
        if (!userText) return;

        if (chatLibrary[currentChatId].title === "New Session") {
            chatLibrary[currentChatId].title = userText;
            renderSidebar();
        }

        appendUserMessage(userText, 0);
        
        chatLibrary[currentChatId].history.push({ 
            "role": "user", 
            "content": userText
        });
        saveToStorage();
        
        userInput.value = '';
        userInput.style.height = '28px';
        toggleSendBtnState();

        const chosenModel = modelSelect.value;
        const aiMessageTextBlock = appendAiMessagePlaceholder();
        
        aiMessageTextBlock.innerHTML = `
            <div class="typing-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        `;
        scrollToBottom();

        let fullAiResponse = "";

        try {
            let apiMessages = [];
            chatLibrary[currentChatId].history.forEach(msg => {
                apiMessages.push({ role: msg.role, content: msg.content });
            });

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: chosenModel, 
                    messages: apiMessages, 
                    stream: true,
                    temperature: 0.5,
                    max_completion_tokens: 1024 
                })
            });

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                const errMsg = data.error?.message || "The honeycomb network dropped.";
                updateAiMessage(aiMessageTextBlock, `Error: ${errMsg}`);
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";
            let hasBegunReceiving = false;

            outerStreamLoop: while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();

                for (const line of lines) {
                    const cleanLine = line.trim();
                    if (!cleanLine) continue;
                    if (cleanLine === "data: [DONE]") {
                        break outerStreamLoop;
                    }
                    if (cleanLine.startsWith("data: ")) {
                        try {
                            const parsed = JSON.parse(cleanLine.substring(6));
                            const content = parsed.choices[0]?.delta?.content || "";
                            if (content) {
                                if (!hasBegunReceiving) {
                                    aiMessageTextBlock.innerHTML = ""; 
                                    hasBegunReceiving = true;
                                }
                                fullAiResponse += content;
                                updateAiMessage(aiMessageTextBlock, fullAiResponse);
                            }
                        } catch (e) {}
                    }
                }
            }

            chatLibrary[currentChatId].history.push({ "role": "assistant", "content": fullAiResponse });
            saveToStorage();

        } catch (error) {
            console.error(error);
            updateAiMessage(aiMessageTextBlock, "Network Error: Bee flight blocked.");
        }
    }

    function appendSystemMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.style.animationDelay = '0s';
        row.innerHTML = `
            <div class="ai-avatar" style="border-color: #555;">Bee</div>
            <div class="text-block" style="color: #666; font-size: 13px; font-weight: 600;">${escapeHtml(text)}</div>
        `;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendUserMessage(text, idx = 0) {
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.style.animationDelay = `${Math.min(idx * 0.08, 0.5)}s`;

        row.innerHTML = `
            <div class="text-block" style="display:flex; flex-direction:column; align-items:flex-end;">
                <div style="width:100%; text-align:left;">${escapeHtml(text)}</div>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendAiMessagePlaceholder(idx = 0) {
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.style.animationDelay = `${Math.min(idx * 0.08, 0.5)}s`;
        row.innerHTML = `
            <div class="ai-avatar">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgGbIL8ZPdSPu6hTlRtfzbXE4hhPn977svX9BmFQN3Mg&s=10" alt="Bee avatar">
            </div>
            <div class="text-block"></div>
        `;
        chatBox.appendChild(row);
        scrollToBottom();
        return row.querySelector('.text-block');
    }

    function formatMessage(str) {
        let html = escapeHtml(str);
        const parts = html.split(/```/g);
        let result = "";
        
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                let codePart = parts[i];
                let lang = "code";
                
                const firstNewline = codePart.indexOf("\n");
                if (firstNewline !== -1) {
                    const possibleLang = codePart.substring(0, firstNewline).trim();
                    if (possibleLang && possibleLang.length < 15 && !possibleLang.includes(" ")) {
                        lang = possibleLang;
                        codePart = codePart.substring(firstNewline + 1);
                    } else if (possibleLang === "") {
                        codePart = codePart.substring(firstNewline + 1);
                    }
                }
                
                if (i === parts.length - 1) {
                    codePart = codePart.trimEnd();
                }

                result += `
                <div class="code-container">
                    <div class="code-header">
                        <span class="code-lang">${lang}</span>
                        <button class="copy-btn" onclick="playClickSound(); copyCode(this)">Copy</button>
                    </div>
                    <pre class="code-block"><code>${codePart}</code></pre>
                </div>`;
            } else {
                let textPart = parts[i];
                textPart = textPart.replace(/`([^`\n]+)`/g, '<code style="background: rgba(251, 187, 44, 0.15); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 90%; color: #ffd666;">$1</code>');
                textPart = textPart.replace(/\n/g, '<br>');
                textPart = textPart.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 16px; margin-top: 12px; display: block; border: 1px solid rgba(251,187,44,0.3); box-shadow: 0 10px 30px rgba(251,187,44,0.1); animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;">');
                textPart = textPart.replace(/_([^_]+)_/g, '<em>$1</em>');
                textPart = textPart.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                textPart = textPart.replace(/(^|\s)(https:\/\/image\.pollinations\.ai\/[^\s<]+)/g, '$1<img src="$2" alt="Generated Image" style="max-width: 100%; border-radius: 16px; margin-top: 12px; display: block; border: 1px solid rgba(251,187,44,0.3); box-shadow: 0 10px 30px rgba(251,187,44,0.1); animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;">');
                textPart = textPart.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="chat-link">$1</a>');
                textPart = textPart.replace(/(^|\s)(https?:\/\/[^\s<)]+)/g, function(match, p1, p2) {
                    if (p2.includes('image.pollinations.ai')) return match; 
                    return p1 + '<a href="' + p2 + '" target="_blank" class="chat-link">' + p2 + '</a>';
                });
                result += textPart;
            }
        }
        return result;
    }

    function copyCode(button) {
        const container = button.closest('.code-container');
        const codeEl = container.querySelector('code');
        const codeText = codeEl.textContent;
        
        navigator.clipboard.writeText(codeText).then(() => {
            const originalText = button.innerText;
            button.innerText = "COPIED";
            button.style.backgroundColor = "#fbbb2c";
            button.style.color = "#000000";
            button.style.borderColor = "#fbbb2c";
            
            setTimeout(() => {
                button.innerText = originalText;
                button.style.backgroundColor = "transparent";
                button.style.color = "#aaaaaa";
                button.style.borderColor = "rgba(251, 187, 44, 0.3)";
            }, 2000);
        }).catch(err => {
            console.error(err);
            button.innerText = "ERR";
        });
    }

    function updateAiMessage(element, text) {
        element.innerHTML = formatMessage(text);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
