<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Workspace</title>
    <style>
        :root {
            --bg-sidebar: #191919;
            --bg-main: #202020;
            --bg-input: #262626;
            --border-color: #313131;
            --text-primary: #e3e3e2;
            --text-secondary: #9b9a97;
            --accent-coral: #d97756;
            --accent-purple: #a78bfa;
            --accent-purple-bg: rgba(124, 58, 237, 0.15);
            --font-serif: Charter, Georgia, Cambria, "Times New Roman", Times, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 10;
        }

        /* Navigation List */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 24px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .nav-item:hover {
            background-color: #242424;
            color: var(--text-primary);
        }

        .nav-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            color: inherit;
        }

        /* Upgrade Pill */
        .upgrade-badge {
            background-color: var(--accent-purple-bg);
            color: var(--accent-purple);
            border: 1px solid rgba(124, 58, 237, 0.25);
            font-size: 11px;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 12px;
            text-transform: capitalize;
        }

        /* Recents Section Header */
        .recents-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px 8px 12px;
            margin-top: 8px;
        }

        .recents-header svg {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        /* Dynamic Chat History */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-right: 2px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13.5px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover {
            background: #242424;
            color: var(--text-primary);
        }

        .history-item.active {
            background: #2a2a2a;
            color: var(--text-primary);
            font-weight: 500;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 8px;
        }

        .delete-chat-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .delete-chat-btn {
            opacity: 0.6;
        }

        .delete-chat-btn:hover {
            opacity: 1 !important;
            color: #ef4444 !important;
        }

        /* --- MAIN WORKSPACE --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Welcome Container (Centered on Landing Page) */
        .center-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            overflow-y: auto;
            scrollbar-width: none; /* Hide scrollbars for layout beauty */
        }

        .center-content-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Dynamic Layout Engine */
        .main-content.is-empty .center-content-wrapper {
            justify-content: center;
            align-items: center;
        }

        .main-content.is-empty .chat-container {
            display: none;
        }

        .main-content.is-empty .welcome-screen {
            display: flex;
        }

        .main-content:not(.is-empty) .welcome-screen {
            display: none;
        }

        .main-content:not(.is-empty) .chat-container {
            display: flex;
        }

        .main-content:not(.is-empty) .input-panel {
            margin-top: auto;
            padding-bottom: 24px;
        }

        /* Welcome State Elements */
        .welcome-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 24px;
        }

        .welcome-logo {
            width: 44px;
            height: 44px;
            margin-bottom: 16px;
        }

        .welcome-text {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* --- SCROLLABLE CHAT CONTAINER --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message-row {
            display: flex;
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.35s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.user-row .text-block {
            background-color: var(--bg-input);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 18px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
        }

        .message-row.ai-row {
            justify-content: flex-start;
            gap: 16px;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ai-avatar svg {
            width: 24px;
            height: 24px;
        }

        .message-row.ai-row .text-block {
            color: var(--text-primary);
            font-size: 15.5px;
            line-height: 1.6;
            width: 100%;
            max-width: calc(100% - 48px);
        }

        /* --- SYSTEM/STATUS MESSAGES --- */
        .system-row {
            display: flex;
            justify-content: center;
            margin: 8px 0;
        }
        .system-pill {
            background-color: #191919;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        /* --- INPUT PANEL & CONTROLS --- */
        .input-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-wrapper {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #4a4a4a;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 200px;
            height: 24px;
            line-height: 24px;
            padding: 0;
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        /* Bottom Row inside Input Box */
        .input-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .control-btn:hover {
            background-color: #2e2e2e;
            color: var(--text-primary);
        }

        .control-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Attachment Plus Button Specifics */
        .plus-btn {
            border: 1px solid var(--border-color);
        }

        /* Model Selector Pill */
        .model-select-pill {
            background-color: #2e2e2e;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            cursor: pointer;
            position: relative;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .model-select-pill:hover {
            background-color: #383838;
            color: var(--text-primary);
        }

        .model-select-pill select {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            appearance: none;
        }

        /* --- PILL SUGGESTIONS --- */
        .pill-suggestions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestion-pill {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .suggestion-pill:hover {
            background-color: #2d2d2d;
            border-color: #444;
            color: var(--text-primary);
        }

        .suggestion-pill svg {
            width: 15px;
            height: 15px;
        }

        /* --- TYPING INDICATOR --- */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 24px;
            padding: 4px 0;
        }

        .typing-indicator .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* --- CODE BOX STYLING --- */
        .code-container {
            margin: 16px 0;
            background: #191919;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            background: #222;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--text-primary);
        }

        .code-block {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            font-size: 13.5px;
            line-height: 1.5;
            color: #f1f1f1;
            font-family: Consolas, Monaco, monospace;
        }

        /* General Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }
    </style>
</head>

    </div>

<script>
    // --- MODEL SYSTEM PROMPTS & CONFIGURATIONS ---
    // Access this configuration block directly to modify prompts or add more models!
    const MODEL_CONFIGS = {
        'groq/sonnet-medium': {
            displayName: "opus 4.8",
            systemPrompt: "Your name is opus AI. You are a highly professional, polite, and logical AI assistant styled inside an ultra-minimal workspace interface. Talk cleanly, elegantly, and give precise, highly-formatted responses.",
            apiModel: "groq/compound"
        },
        'groq/sonnet-flash': {
            displayName: "Sonnet 5 ",
            systemPrompt: "your name is Sonnet. You are a lightning-fast creative designer agent. Keep your answers ultra-punchy, brief, and highly functional. Emphasize speed and action.",
            apiModel: "groq/compound"
        },
        'groq/llama-coder': {
            displayName: "fable 5",
            systemPrompt: "your name is fable You are an elite code architect. Write strictly optimal, modular code with comments limited only to explanations of extreme complexity. Do not output prose or conversational text unless requested.",
            apiModel: "groq/compound"
        }
    };

    const apiKey = "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"; 

    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const selectedModelLabel = document.getElementById('selectedModelLabel');
    const chatBox = document.getElementById('chatBox');
    const chatHistoryContainer = document.getElementById('chatHistoryContainer');
    const newChatBtn = document.getElementById('newChatBtn');
    const mainContent = document.getElementById('mainContent');
    const greetingText = document.getElementById('greetingText');
    const suggestionsContainer = document.getElementById('suggestionsContainer');

    let chatLibrary = {}; 
    let currentChatId = "";

    const clickSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav");
    clickSound.volume = 0.2;

    function playSound() {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
    }

    // Dynamic Welcomer Greeting based on Hour
    function updateGreeting() {
        const hour = new Date().getHours();
        let greeting = "Good evening";
        if (hour < 12) {
            greeting = "Good morning";
        } else if (hour < 18) {
            greeting = "Good afternoon";
        }
        greetingText.innerText = `${greeting}, Jorge`;
    }

    // Pull config for currently selected model ID
    function getCurrentModelConfig() {
        const selectedVal = modelSelect.value;
        return MODEL_CONFIGS[selectedVal] || MODEL_CONFIGS['groq/sonnet-medium'];
    }

    window.onload = () => {
        updateGreeting();
        const savedLibrary = localStorage.getItem('claude_ai_library');
        const savedCurrentId = localStorage.getItem('claude_ai_current_id');
        
        if (savedLibrary) {
            chatLibrary = JSON.parse(savedLibrary);
            currentChatId = savedCurrentId;
            if (!chatLibrary[currentChatId]) createNewChat();
        } else {
            createNewChat();
        }
        renderSidebar();
        loadChatMessages();
    };

    function saveToStorage() {
        localStorage.setItem('claude_ai_library', JSON.stringify(chatLibrary));
        localStorage.setItem('claude_ai_current_id', currentChatId);
    }

    function createNewChat() {
        const id = 'chat_' + Date.now();
        const config = getCurrentModelConfig();

        chatLibrary[id] = {
            title: "New Session",
            modelId: modelSelect.value, // Bind current model to session state
            history: [{ "role": "system", "content": config.systemPrompt }]
        };
        currentChatId = id;
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function switchChat(id) {
        if (currentChatId === id) return;
        playSound();
        currentChatId = id;

        // Restore chosen model configuration for this exact historic thread
        if (chatLibrary[id].modelId && MODEL_CONFIGS[chatLibrary[id].modelId]) {
            modelSelect.value = chatLibrary[id].modelId;
            updateModelLabel(false);
        }

        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function deleteChat(id, event) {
        event.stopPropagation();
        playSound();
        delete chatLibrary[id];
        const remainingIds = Object.keys(chatLibrary);
        if (remainingIds.length === 0) {
            createNewChat();
        } else if (currentChatId === id) {
            currentChatId = remainingIds[remainingIds.length - 1];
        }
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function renderSidebar() {
        chatHistoryContainer.innerHTML = '';
        const ids = Object.keys(chatLibrary);
        ids.forEach((id) => {
            const chatItem = chatLibrary[id];
            
            // Bypass rendering empty or dummy entries that do not have title or actual message threads
            if (chatItem.title === "New Session" && id !== currentChatId) return;

            const row = document.createElement('div');
            row.className = `history-item ${id === currentChatId ? 'active' : ''}`;
            row.onclick = () => switchChat(id);

            const titleSpan = document.createElement('span');
            titleSpan.className = 'history-title';
            titleSpan.innerText = chatItem.title;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-chat-btn';
            deleteBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
            deleteBtn.onclick = (e) => deleteChat(id, e);

            row.appendChild(titleSpan);
            row.appendChild(deleteBtn);
            chatHistoryContainer.insertBefore(row, chatHistoryContainer.firstChild);
        });
    }

    function loadChatMessages() {
        chatBox.innerHTML = '';
        const activeHistory = chatLibrary[currentChatId].history;
        
        // Remove system instructions when checking UI state
        const conversationalMessages = activeHistory.filter(msg => msg.role !== 'system');

        if (conversationalMessages.length === 0) {
            mainContent.classList.add('is-empty');
            suggestionsContainer.style.display = 'flex';
            userInput.placeholder = "How can I help you today?";
        } else {
            mainContent.classList.remove('is-empty');
            suggestionsContainer.style.display = 'none';
            userInput.placeholder = "Message AI...";
            
            appendSystemMessage("Workspace Connection Secure");

            conversationalMessages.forEach((msg, idx) => {
                if (msg.role === 'user') {
                    appendUserMessage(msg.content, idx);
                }
                if (msg.role === 'assistant') {
                    const block = appendAiMessagePlaceholder(idx);
                    updateAiMessage(block, msg.content);
                }
            });
        }
    }

    newChatBtn.addEventListener('click', () => {
        playSound();
        createNewChat();
    });

    function autoGrow(element) {
        element.style.height = "24px";
        if (element.scrollHeight > 24) {
            element.style.height = (element.scrollHeight) + "px";
        }
    }

    function updateModelLabel(shouldPlaySound = true) {
        if (shouldPlaySound) playSound();
        const config = getCurrentModelConfig();
        selectedModelLabel.innerText = config.displayName;

        // If this is a completely fresh chat, apply the dynamic system prompt immediately
        if (chatLibrary[currentChatId] && chatLibrary[currentChatId].history.length === 1) {
            chatLibrary[currentChatId].history[0].content = config.systemPrompt;
            chatLibrary[currentChatId].modelId = modelSelect.value;
            saveToStorage();
        }
    }

    // Pill suggestions dynamic insertion
    function usePillPrompt(type) {
        playSound();
        const prompts = {
            'code': 'Write a clean script to ',
            'write': 'Draft a professional proposal regarding ',
            'learn': 'Explain the key concepts of ',
            'life': 'Create a weekly routine structure for ',
            'choice': 'What is an interesting scientific discovery about '
        };
        userInput.value = prompts[type] || '';
        userInput.focus();
        autoGrow(userInput);
    }

    async function sendMessage(event) {
        playSound();
        let userText = userInput.value.trim();
        if (!userText) return;

        if (chatLibrary[currentChatId].title === "New Session") {
            chatLibrary[currentChatId].title = userText;
        }

        // Shift layout out of empty state
        mainContent.classList.remove('is-empty');
        suggestionsContainer.style.display = 'none';
        userInput.placeholder = "Message Bee AI...";

        appendUserMessage(userText, 0);
        
        chatLibrary[currentChatId].history.push({ 
            "role": "user", 
            "content": userText
        });
        saveToStorage();
        renderSidebar();
        
        userInput.value = '';
        userInput.style.height = '24px';

        const activeConfig = getCurrentModelConfig();
        const aiMessageTextBlock = appendAiMessagePlaceholder();
        
        aiMessageTextBlock.innerHTML = `
            <div class="typing-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        `;
        scrollToBottom();

        let fullAiResponse = "";

        try {
            let apiMessages = [];
            chatLibrary[currentChatId].history.forEach(msg => {
                apiMessages.push({ role: msg.role, content: msg.content });
            });

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "model": activeConfig.apiModel, 
                    "messages": apiMessages, 
                    "stream": true,
                   " temperature": 0.6,
                    "max_completion_tokens": 9000,
                     "compound_custom": {
    "tools": {
      "enabled_tools": [
        "web_search",
        "code_interpreter",
        "visit_website"
                })
            });

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                const errMsg = data.error?.message || "Workspace stream connection dropped.";
                updateAiMessage(aiMessageTextBlock, `Error: ${errMsg}`);
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";
            let hasBegunReceiving = false;

            outerStreamLoop: while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();

                for (const line of lines) {
                    const cleanLine = line.trim();
                    if (!cleanLine) continue;
                    if (cleanLine === "data: [DONE]") {
                        break outerStreamLoop;
                    }
                    if (cleanLine.startsWith("data: ")) {
                        try {
                            const parsed = JSON.parse(cleanLine.substring(6));
                            const content = parsed.choices[0]?.delta?.content || "";
                            if (content) {
                                if (!hasBegunReceiving) {
                                    aiMessageTextBlock.innerHTML = ""; 
                                    hasBegunReceiving = true;
                                }
                                fullAiResponse += content;
                                updateAiMessage(aiMessageTextBlock, fullAiResponse);
                            }
                        } catch (e) {}
                    }
                }
            }

            chatLibrary[currentChatId].history.push({ "role": "assistant", "content": fullAiResponse });
            saveToStorage();

        } catch (error) {
            console.error(error);
            updateAiMessage(aiMessageTextBlock, "Network Connection Failed. Please retry.");
        }
    }

    function appendSystemMessage(text) {
        const row = document.createElement('div');
        row.className = 'system-row';
        row.innerHTML = `<span class="system-pill">${escapeHtml(text)}</span>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendUserMessage(text, idx = 0) {
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.innerHTML = `
            <div class="text-block">
                <div>${escapeHtml(text)}</div>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendAiMessagePlaceholder(idx = 0) {
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.innerHTML = `
            <div class="ai-avatar">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12.3 5 13.5 8.5 15.5 10.5C17.5 12.5 21 13.7 24 14C21 14.3 17.5 15.5 15.5 17.5C13.5 19.5 12.3 23 12 26C11.7 23 10.5 19.5 8.5 17.5C6.5 15.5 3 14.3 0 14C3 13.7 6.5 12.5 8.5 10.5C10.5 8.5 11.7 5 12 2Z" fill="#d97756" />
                </svg>
            </div>
            <div class="text-block"></div>
        `;
        chatBox.appendChild(row);
        scrollToBottom();
        return row.querySelector('.text-block');
    }

    function formatMessage(str) {
        let html = escapeHtml(str);
        const parts = html.split(/```/g);
        let result = "";
        
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                let codePart = parts[i];
                let lang = "code";
                
                const firstNewline = codePart.indexOf("\n");
                if (firstNewline !== -1) {
                    const possibleLang = codePart.substring(0, firstNewline).trim();
                    if (possibleLang && possibleLang.length < 15 && !possibleLang.includes(" ")) {
                        lang = possibleLang;
                        codePart = codePart.substring(firstNewline + 1);
                    } else if (possibleLang === "") {
                        codePart = codePart.substring(firstNewline + 1);
                    }
                }
                
                if (i === parts.length - 1) {
                    codePart = codePart.trimEnd();
                }

                result += `
                <div class="code-container">
                    <div class="code-header">
                        <span class="code-lang">${lang}</span>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                    <pre class="code-block"><code>${codePart}</code></pre>
                </div>`;
            } else {
                let textPart = parts[i];
                textPart = textPart.replace(/`([^`\n]+)`/g, '<code style="background: rgba(255, 255, 255, 0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 90%; color: #ffd666;">$1</code>');
                textPart = textPart.replace(/\n/g, '<br>');
                textPart = textPart.replace(/_([^_]+)_/g, '<em>$1</em>');
                textPart = textPart.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                textPart = textPart.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#d97756; text-decoration:none; font-weight:600;">$1</a>');
                result += textPart;
            }
        }
        return result;
    }

    function copyCode(button) {
        const container = button.closest('.code-container');
        const codeEl = container.querySelector('code');
        const codeText = codeEl.textContent;
        
        navigator.clipboard.writeText(codeText).then(() => {
            const originalText = button.innerText;
            button.innerText = "COPIED";
            setTimeout(() => { button.innerText = originalText; }, 2000);
        }).catch(() => {
            button.innerText = "ERR";
        });
    }

    function updateAiMessage(element, text) {
        element.innerHTML = formatMessage(text);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function triggerToast(featureName) {
        playSound();
        alert(`${featureName} is preview-only in this layout.`);
    }
</script>
</body>
</html>
